name: smart_store
description: "تطبيق احترافي لإدارة المنتجات مع مسح الباركود ونظام الصلاحية والتنبيهات"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.2

  # Barcode Scanner
  mobile_scanner: ^5.2.3
  permission_handler: ^12.0.1
  app_settings: ^7.0.0

  # Local Notifications
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1

  # File Management
  file_picker: ^8.0.0+1
  share_plus: ^9.0.0

  # UI & Animations
  flutter_animate: ^4.5.0
  skeletonizer: ^2.1.2
  intl: ^0.20.2

  # Utilities
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700